name: Code Review

  on:
    pull_request:
      types: [opened, synchronize]

  permissions:
    pull-requests: write
    contents: read

  jobs:
    review:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Get PR diff
          id: diff
          run: |
            git diff origin/${{ github.base_ref }}...HEAD > pr.diff
            echo "diff_file=pr.diff" >> $GITHUB_OUTPUT

        - name: Claude Code Review with MiniMax
          env:
            MINIMAX_API_URL: ${{ secrets.MINIMAX_API_URL }}
            MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          run: |
            DIFF=$(cat pr.diff)

            curl -X POST $MINIMAX_API_URL \
              -H "Authorization: Bearer $MINIMAX_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"model\": \"your-model\",
                \"messages\": [
                  {\"role\": \"user\", \"content\": \"你是一个代码审查专家。请审查以下PR的改动，重点关注：1) 代码正确性 2)
  潜在bug 3) 性能问题 4) 安全漏洞。\\n\\n\`\`\`diff\\n$DIFF\\n\`\`\`\"}
                ]
              }" | jq -r '.choices[0].message.content' > review_comment.md

        - name: Post review comment
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const comment = fs.readFileSync('review_comment.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
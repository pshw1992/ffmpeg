name: Claude AI Audit (MiniMax M2.7)

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude with MiniMax
        shell: bash
        env:
          # 关键：映射到 ANTHROPIC 变量名以跳过登录校验
          ANTHROPIC_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          # 指定模型
          CLAUDE_MODEL: "minimax-m2.7" 
        run: |
          # -p: 非交互打印模式
          # --dangerously-skip-permissions: 自动允许文件读取/执行工具
          claude -p "请检查最近提交的代码变化，分析潜在的 Bug 或性能瓶颈，并给出优化建议。" \
                 --dangerously-skip-permissions

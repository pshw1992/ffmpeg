name: Claude AI Assistant (MiniMax M2.7)

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Claude for MiniMax
        run: |
          # 针对 MiniMax M2.7 的自定义配置 (需根据你使用的连接器/脚本进行调整)
          # 注意：Claude Code 原生支持 Anthropic，使用国产模型通常需要类似 claude-code-kimi-groq 的中间层
          export CLAUDE_BASE_URL=${{ secrets.MINIMAX_BASE_URL }}
          export CLAUDE_API_KEY=${{ secrets.MINIMAX_API_KEY }}
          export CLAUDE_MODEL="minimax-m2.7"

      - name: Run Non-Interactive Command
        run: |
          # 使用 --yes 或类似非交互模式标志执行任务
          claude "请检查当前代码逻辑并提出优化建议" --non-interactive

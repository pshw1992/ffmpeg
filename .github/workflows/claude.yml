name: Claude Code (MiniMax)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write 

jobs:
  claude_job:
    # 仅当在 PR/Issue 中被 @claude 提到，或者在主分支 push 时运行
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'claude'))
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        env:
          # 使用 MiniMax 的 API Key（请在 GitHub Secrets 中设置）
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }} 
          # 核心设置：指向 MiniMax 的 Anthropic 兼容端点
          ANTHROPIC_BASE_URL: "https://minimax.io"
          # 指定使用的模型名称
          CLAUDE_MODEL: "claude-3-5-sonnet" 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 你可以在这里自定义 Claude 运行时的初始指令
          message: "Please review the changes and suggest improvements or fixes."

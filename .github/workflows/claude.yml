name: Claude Code Review

  on:
    pull_request:
      types: [opened, synchronize]
    workflow_dispatch:

  permissions:
    pull-requests: write
    contents: read

  jobs:
    review:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Get PR diff
          id: diff
          run: |
            git fetch origin ${{ github.base_ref }} --depth=1
            git diff origin/${{ github.base_ref }}...HEAD > pr.diff
            echo "diff_length=$(wc -l < pr.diff)" >> $GITHUB_OUTPUT

        - name: Claude Code Review
          uses: anthropics/claude-code-action@v1
          env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            ANTHROPIC_BASE_URL: https://api.minimaxi.com/anthropic
            ANTHROPIC_MODEL: MiniMax-M2.7

        - name: Post review comment
          if: steps.diff.outputs.diff_length > 0
          uses: actions/github-script@v7
          with:
            script: |
              const fs = require('fs');
              const diff = fs.readFileSync('pr.diff', 'utf8');
              const comment = fs.readFileSync('claude_review.md', 'utf8').replace(/[\s\S]*?## 分析结果[\s\S]*?\n##\s/,'');

              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Claude Code Review\n\n${comment}\n\n---\n<sub>🤖 Generated by Claude Code with MiniMax-M2.7</sub>`
              });